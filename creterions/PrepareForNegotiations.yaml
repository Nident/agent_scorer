name: Prepare for negotiations
points: |
  - Уверенно формулирует повестку в начале встречи или дополняет повестку, предложенную оппонентом.
  - Использует релевантные данные и факты в аргументации своих стартовых значений, в усилении своей позиции и ослаблении позиции оппонента.
  - Демонстрирует понимание интересов и потребностей оппонента.
  - Задаёт правильные вопросы о контексте и ожиданиях оппонента.
  - Уверенно и чётко проговаривает все цифры и значения и отвечает на сложные вопросы и попытки давления со стороны оппонента, не ослабляя свою позицию.
  - При изменении размера переменных при торге и обмене уступками прослеживается чёткая логика и взаимосвязь.
  - Прослеживается чёткий план действий и готовность к разным сценариям развития встречи.