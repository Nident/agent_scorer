name: Effectively exchanges concessions
points: |
  - Не ухудшает своё предложение, не потребовав ничего взамен.
  - Меняет то, что важно оппоненту, на то, что важно самому.
  - Каждый следующий шаг в уступках по каждой переменной делает меньше предыдущего шага, чтобы создать ощущение, что подходит к своему пределу по этой переменной.
  - Не продолжает настаивать на своём предложении, если уже очевидно, что оно не будет принято, ищет новые возможности.
  - Просит незначительные уступки, даже когда предложение оппонента уже полностью устраивает.
  - Использует фразы типа «если вы... то мы...».
  - Реагирует позитивно на встречные уступки, подтверждая их ценность.