name: Listens and correctly interprets what he hears
points: |
  - Даёт высказаться другой стороне.
  - Больше слушает, чем говорит.
  - Проявляет заинтересованность и уточняет понимание.
  - Слушает и интерпретирует скрытое в словах значение.
  - Активно подтверждает услышанное словами («Если я правильно понял...», «Вы имеете в виду...»).
  - Отражает ключевые мысли собеседника своими словами, не делает поспешных выводов и уточняет спорные моменты.
  - Демонстрирует эмпатию через словесное признание чувств другой стороны («Понимаю вашу обеспокоенность...»).