name: Asks questions effectively
points: |
  - Чётко формулирует вопросы и делает паузу, чтобы получить ответ.
  - Уточняет и добивается конкретики в ответах на свои вопросы.
  - Фокусируется не на позиции, а на интересах оппонента.
  - Эффективно задаёт вопросы, чтобы выяснить приоритеты другой стороны.
  - Своевременно резюмирует и убеждается в правильности понимания.