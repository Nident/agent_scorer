name: Clearly formulates his proposals
points: |
  - Формулирует свои предложения в формате «Если Вы ..., то мы ...», то есть сначала озвучивает требование, а затем на какую уступку готов пойти, если его примут.
  - Всегда делает паузу после озвученного предложения.
  - Формулирует предложения в форме утверждения, а не вопроса.
  - Не обсуждает нереальные предложения оппонента.
  - Не тянет с ответом «НЕТ» и с реакцией на неприемлемое предложение оппонента.
  - Использует простые и конкретные формулировки без двусмысленностей.
  - Подтверждает понимание своих предложений у собеседника вопросами.
  - Никогда не принимает первого предложения оппонента.
  - При ответе на предложение оппонента использует связку "Нет" - объясняет почему и делает контр-предложение.