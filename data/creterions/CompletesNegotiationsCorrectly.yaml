name: Completes negotiations correctly
points: |
  - Проверяет, что оппонент правильно понял, о чём договорились.
  - Проговаривает все договоренности.
  - Просит заключительные уступки, тем самым создавая ощущение, что сделка даётся нелегко и вторая сторона может чувствовать себя победителем.
  - Контролирует эмоции и не показывает оппоненту, что очень рад сделке, даже если результат выше ожиданий.
  - Не отдаёт лишнего на финальной стадии, не попросив ничего взамен, а просто, чтобы «подтолкнуть» оппонента принять быстро положительное решение.
  - Использует позитивное завершение («Рад(а), что мы пришли к согласию»).
  - Оговаривает дальнейшие шаги или планы коммуникации.