name: Creates a climate of trust and cooperation
points: |
  - Находит общую платформу, общие интересы в переговорах.
  - Стремится к взаимовыгодным решениям.
  - Открыт для предложений второй стороны переговоров.
  - Берёт на себя ответственность за создание и поддержание атмосферы доверия.
  - По мере развития переговоров использует аналитические способности для управления ценностью сделки.
  - Использует дружелюбный тон и позитивную лексику.
  - Подчеркивает общие цели и интересы словами («Наша общая задача...»).
  - Поощряет открытый обмен мнениями и признает вклад собеседника.
  - Избегает обвинений и критики в адрес оппонента.
  - Демонстрирует готовность к совместному решению проблем через диалог.