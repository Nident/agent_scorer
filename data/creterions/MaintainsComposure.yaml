name: Maintains composure
points: |
  - Не выдаёт лишней информации.
  - Не допускает эскалации конфликта при попытке давления с другой стороны.
  - Не теряется и продолжает конструктивно работать, даже находясь под давлением.
  - Говорит спокойным ровным тоном даже при напряжении в разговоре.
  - Не повышает голос и не использует агрессивную лексику.
  - Делает паузы перед ответом на провокационные высказывания.
  - Использует нейтральные формулировки вместо обвинений («Я вижу ситуацию так...»).
  - Спокойно реагирует на критику или контраргументы, не переходя в защиту или нападение.