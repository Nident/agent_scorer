cases:
  - id: seller_prepared_high
    title: "Продавец системно подготовлен к переговорам"
    role: seller
    evaluated_speaker: "Продавец"
    criterion_path: creterions/PrepareForNegotiations.yaml
    dialogue: |
      Заказчик: Начнем сразу с цены. Нам нужен минус 15%.
      Продавец: Предлагаю такую повестку: сначала зафиксируем объем и сроки, затем обсудим цену и сервисный уровень, в конце договоримся о следующих шагах.
      Заказчик: Хорошо, но цена все равно главная.
      Продавец: Я понимаю, что для вас важны бюджет и прогнозируемость поставок. По статистике прошлых трех месяцев ваш средний заказ 1200 единиц, поэтому стартовая цена 980 рублей держит маржу и SLA 98%.
      Продавец: Подскажите, какой лимит бюджета утвержден и какие сроки запуска критичны?
      Заказчик: Совет давит на нас, если не уложимся в 900, пойдем к другим.
      Продавец: 900 при SLA 98% не работает. Если объем будет 1500 единиц и предоплата 50%, мы можем дать 940; если оставляем 1200 и постоплату, цена остается 980.
      Продавец: Если этот вариант не пройдет, у меня есть второй сценарий: пилот на один месяц по 960 и совместный пересмотр после фактического объема.
    expected:
      matched_point_indices: [1, 2, 3, 4, 5, 6, 7]
      score_raw: 7
      max_score: 7
      score_0_10: 10.0

  - id: buyer_unprepared_low
    title: "Покупатель почти не демонстрирует подготовку"
    role: buyer
    evaluated_speaker: "Покупатель"
    criterion_path: creterions/PrepareForNegotiations.yaml
    dialogue: |
      Продавец: Давайте обсудим объем, сроки и бюджет.
      Покупатель: Нам просто нужна цена ниже.
      Продавец: На какой объем вы рассчитываете?
      Покупатель: Пока не знаю, потом решим. Просто сделайте скидку.
      Продавец: Есть ограничения по запуску или оплате?
      Покупатель: Посмотрим. Если будет дорого, мы уйдем к другим.
      Продавец: Что для вас кроме цены важно?
      Покупатель: Главное, чтобы было дешевле. Остальное потом.
    expected:
      matched_point_indices: []
      score_raw: 0
      max_score: 7
      score_0_10: 0.0

  - id: buyer_prepared_medium
    title: "Покупатель подготовил данные, интересы и вопросы, но без сценарного плана"
    role: buyer
    evaluated_speaker: "Покупатель"
    criterion_path: creterions/PrepareForNegotiations.yaml
    dialogue: |
      Продавец: Как вы хотите построить встречу?
      Покупатель: Предлагаю сначала согласовать объем, затем цену и сроки внедрения.
      Покупатель: По нашим данным, на текущем тарифе мы переплачиваем 12% относительно рынка при объеме 1000 лицензий.
      Покупатель: Нам важно уложиться в квартальный бюджет и не потерять поддержку в пиковые недели; правильно понимаю, для вас ключевое - загрузка команды и предсказуемая оплата?
      Покупатель: Какие условия по предоплате и срокам для вас критичны?
      Продавец: Если хотите полный SLA, цена будет выше.
      Покупатель: Фиксирую цифры: 1000 лицензий, бюджет 4.2 млн, запуск 1 июня. При цене выше 4.5 млн проект не одобрят.
      Продавец: Понятно, тогда посмотрим варианты.
    expected:
      matched_point_indices: [1, 2, 3, 4, 5]
      score_raw: 5
      max_score: 7
      score_0_10: 7.14

  - id: seller_prepared_no_trade_logic
    title: "Продавец хорошо подготовлен, но не показывает логику обмена уступками"
    role: seller
    evaluated_speaker: "Продавец"
    criterion_path: creterions/PrepareForNegotiations.yaml
    dialogue: |
      Покупатель: У нас мало времени, расскажите коротко.
      Продавец: Предлагаю за 20 минут пройти три блока: ваши ограничения, наш расчет цены и дальнейший план внедрения.
      Продавец: По вашему RFP критичны непрерывность поставок и интеграция за шесть недель, поэтому мы заложили команду внедрения из четырех специалистов.
      Продавец: В аналогичных проектах с объемом от 800 рабочих мест срок запуска занимал 42-45 дней, а стоимость поддержки составляла 7% от бюджета.
      Продавец: Какие риски для вас наиболее болезненны: срок, простой системы или ограничение бюджета?
      Покупатель: Если не дадите цену ниже 3 млн, разговор закончен.
      Продавец: 3 млн не покрывают интеграцию и поддержку. Наш расчет - 3.6 млн, запуск 15 мая, SLA 99.5%; эти параметры я готов защищать перед вашим финансовым директором.
      Продавец: Если сегодня не согласуем бюджет, следующий шаг - технический воркшоп и отдельная встреча по финансовой модели.
    expected:
      matched_point_indices: [1, 2, 3, 4, 5, 7]
      score_raw: 6
      max_score: 7
      score_0_10: 8.57
